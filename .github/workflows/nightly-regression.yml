name: Nightly Regression Tests

on:
  schedule:
    # Minden nap hajnali 3:00 UTC-kor
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Böngésző kiválasztása'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox

jobs:
  regression:
    timeout-minutes: 60
    runs-on: ubuntu-latest
        continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate BDD test files
        run: npx bddgen

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.browser }}" = "all" ] || [ -z "${{ github.event.inputs.browser }}" ]; then
            npx playwright test
          else
            npx playwright test --project=${{ github.event.inputs.browser }}
          fi

      - name: Upload test results (screenshots + logs)
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-custom
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright trace & video
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore
